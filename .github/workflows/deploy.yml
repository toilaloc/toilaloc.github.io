name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into JavaScript
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          GROQ_URL: ${{ secrets.GROQ_URL }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
        run: |
          python3 - <<'EOF'
          import os
          with open('japanese/nihongo-study.js', 'r') as f:
              content = f.read()
          content = content.replace('__SB_URL__', os.environ['SB_URL'])
          content = content.replace('__SB_KEY__', os.environ['SB_KEY'])
          content = content.replace('__GROQ_KEY__', os.environ['GROQ_KEY'])
          content = content.replace('__GROQ_URL__', os.environ['GROQ_URL'])
          content = content.replace('__GROQ_MODEL__', os.environ['GROQ_MODEL'])
          with open('japanese/nihongo-study.js', 'w') as f:
              f.write(content)
          print("Done!")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
